version: '3.8'

services:
  # Next.js Web Application
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: ai-school-app
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app-network

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: redis-app
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  # Python Web Crawler
  crawler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.crawler
    container_name: web-crawler
    volumes:
      - ../crawler:/app/crawler
      - ../requirements.txt:/app/requirements.txt
      - ../.env:/app/.env
      - ../logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - crawler
    networks:
      - app-network

  # Redis Commander (Optional - for Redis management)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      - app-network

volumes:
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge
    name: ai-school-network
