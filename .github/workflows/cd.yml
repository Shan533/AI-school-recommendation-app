name: CD - Deploy to Vercel (prebuilt)

on:
  workflow_run:
    workflows: [ "CI - Lint & Test" ]   # 由 CI 成功后触发
    types: [ "completed" ]

env:
  NODE_VERSION: "20"

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  cd-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Skip deploy (secrets not configured)
        run: |
          echo "CD is disabled because Vercel secrets are not set."
          echo "Add these repo secrets to enable deploy:"
          echo "  - VERCEL_TOKEN"
          echo "  - VERCEL_ORG_ID"
          echo "  - VERCEL_PROJECT_ID"
          echo "Then uncomment the 'deploy-prod' and/or 'deploy-preview' jobs below."


